version: '3.8'
name: werkflow

# ================================================================
# WERKFLOW ENTERPRISE — DOCKER COMPOSE
# ================================================================
# Full enterprise stack: OSS platform + ERP business service.
# Extends the base docker-compose.yml with the werkflow-erp
# business service (HR, Finance, Procurement, Inventory).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.enterprise.yml up -d
# ================================================================

services:
  # ================================================================
  # ENTERPRISE: Business Domain Service (werkflow-erp)
  # Provides HR, Finance, Procurement, Inventory CRUD APIs.
  # Shares the same PostgreSQL instance and Keycloak realm.
  # ================================================================
  business-service:
    build:
      context: ../../../../werkflow-erp
      dockerfile: Dockerfile
      target: business-service
    container_name: werkflow-business
    env_file:
      - ../../../../werkflow-erp/config/env/.env.shared
      - ../../../../werkflow-erp/config/env/.env.business
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: werkflow
      POSTGRES_USER: werkflow_admin
      POSTGRES_PASSWORD: werkflow_secure_pass
      SPRING_DATASOURCE_SCHEMA: business_service
      SERVER_PORT: 8084
      ENGINE_SERVICE_URL: http://werkflow-engine:8081
      ADMIN_SERVICE_URL: http://werkflow-admin:8083
      KEYCLOAK_URL: http://localhost:8090
      KEYCLOAK_JWK_SET_URI: http://werkflow-keycloak:8080/realms/werkflow/protocol/openid-connect/certs
      KEYCLOAK_REALM: werkflow
    ports:
      - "8084:8084"
    volumes:
      - business_logs:/app/logs
    networks:
      - werkflow-network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

volumes:
  business_logs:
    driver: local

networks:
  werkflow-network:
    external: true
    name: werkflow_werkflow-network
