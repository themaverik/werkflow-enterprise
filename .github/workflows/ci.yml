name: CI

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

jobs:
  engine-build:
    name: Engine — Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: werkflow_test
          POSTGRES_USER: werkflow_admin
          POSTGRES_PASSWORD: werkflow_secure_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build shared/common
        working-directory: shared/common
        run: mvn -q clean install -DskipTests -B

      - name: Build & test engine service
        working-directory: services/engine
        run: mvn clean verify -B

      - name: Upload engine test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-surefire-reports
          path: services/engine/target/surefire-reports/
          retention-days: 7

  admin-build:
    name: Admin — Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build shared/common
        working-directory: shared/common
        run: mvn -q clean install -DskipTests -B

      - name: Build & test admin service
        working-directory: services/admin
        run: mvn clean verify -B

  portal-build:
    name: Portal — Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontends/portal/package-lock.json

      - name: Install dependencies
        working-directory: frontends/portal
        run: npm ci

      - name: Type-check
        working-directory: frontends/portal
        run: npx tsc --noEmit

      - name: Build portal
        working-directory: frontends/portal
        env:
          # Dummy values — build-time only, no real backend needed
          NEXTAUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:4000
          KEYCLOAK_CLIENT_ID: werkflow-portal
          KEYCLOAK_CLIENT_SECRET: ci-secret
          KEYCLOAK_ISSUER: http://localhost:8090/realms/werkflow
          NEXT_PUBLIC_KEYCLOAK_ISSUER_BROWSER: http://localhost:8090/realms/werkflow
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: werkflow-portal
          ENGINE_BASE_URL: http://localhost:8081
        run: npm run build

  connector-schema-parity:
    # The connector-definition JSON Schema is byte-duplicated in two repos: the
    # admin service consumes it at runtime (canonical copy) and the public
    # marketplace mirrors it for community connector authors. This job fails if
    # the two copies drift. The enterprise copy is authoritative — sync the
    # public copy to match. (Drift introduced on the public side is caught on the
    # next enterprise CI run, since public→enterprise checkout is not available.)
    name: Connector schema — two-repo parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: admin-build

    steps:
      - name: Checkout enterprise
        uses: actions/checkout@v4

      - name: Checkout public (OSS) repo
        uses: actions/checkout@v4
        with:
          repository: themaverik/werkflow
          ref: main
          path: _public

      - name: Verify connector-definition.schema.json is in sync across repos
        run: |
          ENT="services/admin/src/main/resources/schemas/connector/v1/connector-definition.schema.json"
          PUB="_public/marketplace/schema/connector-definition.schema.json"
          if ! diff -u "$ENT" "$PUB"; then
            echo "::error::connector-definition.schema.json has drifted between werkflow-enterprise (admin) and werkflow-public (marketplace). The enterprise copy is canonical — sync the public copy."
            exit 1
          fi
          echo "connector-definition.schema.json is byte-identical across both repos."
