name: CI / E2E Pipeline

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  engine-build:
    name: Engine — Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: werkflow_test
          POSTGRES_USER: werkflow_admin
          POSTGRES_PASSWORD: werkflow_secure_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build shared/common
        working-directory: shared/common
        run: mvn -q clean install -DskipTests -B

      - name: Create flowable schema
        run: |
          PGPASSWORD=werkflow_secure_pass psql -h localhost -p 5433 -U werkflow_admin -d werkflow_test \
            -c "CREATE SCHEMA IF NOT EXISTS flowable;"

      - name: Build & test engine service
        working-directory: services/engine
        # requires-openbao / fragment / flow groups are excluded in pom.xml <excludedGroups>
        # (Surefire 3.2.x does not reliably honour -DexcludedGroups override of pom config).
        # OpenBao-dependent ITs run via: mvn test -Dgroups=requires-openbao (milestone gate only).
        run: mvn clean verify -B

      - name: Upload engine JAR
        uses: actions/upload-artifact@v4
        with:
          name: engine-jar
          path: services/engine/target/engine-service.jar
          retention-days: 1

      - name: Upload engine test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-surefire-reports
          path: services/engine/target/surefire-reports/
          retention-days: 7

  admin-build:
    name: Admin — Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build shared/common
        working-directory: shared/common
        run: mvn -q clean install -DskipTests -B

      - name: Build & test admin service
        working-directory: services/admin
        run: mvn clean verify -B

      - name: Upload admin JAR
        uses: actions/upload-artifact@v4
        with:
          name: admin-jar
          path: services/admin/target/admin-service.jar
          retention-days: 1

  portal-build:
    name: Portal — Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontends/portal/package-lock.json

      # min-release-age is also enforced by frontends/portal/.npmrc (7 days).
      # This step makes the enforcement visible and auditable in CI logs.
      - name: Verify npm min-release-age is enforced
        working-directory: frontends/portal
        run: |
          age=$(npm config get min-release-age)
          echo "npm min-release-age: $age"
          if [ "$age" = "0" ] || [ "$age" = "undefined" ]; then
            echo "::error::min-release-age is unset or 0. Set it in .npmrc to protect against supply-chain attacks."
            exit 1
          fi

      - name: Install dependencies
        working-directory: frontends/portal
        run: npm ci

      - name: npm audit signatures
        working-directory: frontends/portal
        run: npm audit signatures

      # Report-only: findings are visible in CI logs for triage.
      - name: npm audit (informational)
        working-directory: frontends/portal
        continue-on-error: true
        run: npm audit --audit-level=info 2>&1 || true

      - name: Type-check
        working-directory: frontends/portal
        run: npx tsc --noEmit

      - name: Build portal
        working-directory: frontends/portal
        env:
          NEXTAUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:4000
          KEYCLOAK_CLIENT_ID: werkflow-portal
          KEYCLOAK_CLIENT_SECRET: ci-secret
          KEYCLOAK_ISSUER: http://localhost:8090/realms/werkflow
          NEXT_PUBLIC_KEYCLOAK_ISSUER_BROWSER: http://localhost:8090/realms/werkflow
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: werkflow-portal
          ENGINE_BASE_URL: http://localhost:8081
        run: npm run build

      - name: Upload portal build output
        uses: actions/upload-artifact@v4
        with:
          name: portal-next
          path: frontends/portal/.next/
          include-hidden-files: true
          retention-days: 1

  connector-schema-parity:
    name: Connector schema — two-repo parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: admin-build

    steps:
      - name: Checkout enterprise
        uses: actions/checkout@v4

      - name: Checkout public (OSS) repo
        uses: actions/checkout@v4
        with:
          repository: themaverik/werkflow
          ref: main
          path: _public

      - name: Verify connector-definition.schema.json is in sync across repos
        run: |
          ENT="services/admin/src/main/resources/schemas/connector/v1/connector-definition.schema.json"
          PUB="_public/marketplace/schema/connector-definition.schema.json"
          if ! diff -u "$ENT" "$PUB"; then
            echo "::error::connector-definition.schema.json has drifted between werkflow-enterprise (admin) and werkflow-public (marketplace). The enterprise copy is canonical — sync the public copy."
            exit 1
          fi
          echo "connector-definition.schema.json is byte-identical across both repos."

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [engine-build, admin-build, portal-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontends/portal/package-lock.json

      - name: Download engine JAR
        uses: actions/download-artifact@v4
        with:
          name: engine-jar
          path: services/engine/target/

      - name: Download admin JAR
        uses: actions/download-artifact@v4
        with:
          name: admin-jar
          path: services/admin/target/

      - name: Download portal build output
        uses: actions/download-artifact@v4
        with:
          name: portal-next
          path: frontends/portal/.next/

      - name: Start infrastructure stack
        run: |
          docker compose -f infrastructure/docker/docker-compose.yml up -d --wait postgres keycloak

      - name: Configure Keycloak realm
        env:
          KEYCLOAK_URL: http://localhost:8090
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET || 'REDACTED_KC_SECRET' }}
        run: |
          chmod +x infrastructure/keycloak/setup-ci-realm.sh
          infrastructure/keycloak/setup-ci-realm.sh

      - name: Start engine service
        working-directory: services/engine
        env:
          FLYWAY_ENABLED: "true"
          EXPOSE_MANAGEMENT_ENDPOINTS: "true"
          POSTGRES_PASSWORD: werkflow_secure_pass
          WERKFLOW_VAULT_TOKEN: ci-dummy-token
          WERKFLOW_VAULT_ADDR: http://localhost:8200
        run: |
          java -jar target/*.jar &
          echo "Waiting for engine on port 8081..."
          timeout 120 bash -c 'until curl -sf http://localhost:8081/actuator/health; do sleep 3; done'

      - name: Start admin service
        working-directory: services/admin
        env:
          POSTGRES_PASSWORD: werkflow_secure_pass
          WERKFLOW_VAULT_TOKEN: ci-dummy-token
          WERKFLOW_VAULT_ADDR: http://localhost:8200
        run: |
          java -jar target/*.jar &
          echo "Waiting for admin on port 8083..."
          timeout 90 bash -c 'until curl -sf http://localhost:8083/actuator/health; do sleep 3; done'

      - name: Install portal dependencies
        working-directory: frontends/portal
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontends/portal
        run: npx playwright install --with-deps chromium

      - name: Start portal
        working-directory: frontends/portal
        env:
          NEXTAUTH_SECRET: ci-secret-for-tests
          NEXTAUTH_URL: http://localhost:4000
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID || 'werkflow-portal' }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET || 'REDACTED_KC_SECRET' }}
          KEYCLOAK_ISSUER: http://localhost:8090/realms/werkflow
          NEXT_PUBLIC_KEYCLOAK_ISSUER_BROWSER: http://localhost:8090/realms/werkflow
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID || 'werkflow-portal' }}
          ENGINE_BASE_URL: http://localhost:8081
        run: |
          npm start &
          echo "Waiting for portal on port 4000..."
          timeout 60 bash -c 'until curl -sf http://localhost:4000; do sleep 2; done'

      - name: Run Playwright E2E tests
        working-directory: frontends/portal
        env:
          E2E_ADMIN_USER: admin
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'REDACTED_PASSWORD' }}
          E2E_MANAGER_USER: john.manager
          E2E_MANAGER_PASSWORD: ${{ secrets.E2E_MANAGER_PASSWORD || 'manager123' }}
          E2E_EMPLOYEE_USER: jane.employee
          E2E_EMPLOYEE_PASSWORD: ${{ secrets.E2E_EMPLOYEE_PASSWORD || 'employee123' }}
          E2E_PORTAL_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET || 'REDACTED_KC_SECRET' }}
        # business/ tests require werkflow.examples.deploy-on-startup=true and a specific env —
        # run only the core chromium project in CI; business flows run manually or in staging.
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontends/portal/playwright-report/
            frontends/portal/test-results/
          retention-days: 7
