name: E2E Tests

on:
  push:
    branches: [main, "feature/*"]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontends/portal/package-lock.json

      - name: Start infrastructure stack
        run: |
          docker compose -f infrastructure/docker/docker-compose.yml up -d --wait postgres keycloak

      - name: Configure Keycloak realm
        env:
          KEYCLOAK_URL: http://localhost:8090
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET || 'ci-client-secret' }}
        run: |
          chmod +x infrastructure/keycloak/setup-ci-realm.sh
          infrastructure/keycloak/setup-ci-realm.sh

      - name: Install shared common module
        working-directory: shared/common
        run: mvn -q install -DskipTests

      - name: Build engine service
        working-directory: services/engine
        run: mvn -q package -DskipTests

      - name: Start engine service
        working-directory: services/engine
        env:
          FLYWAY_ENABLED: "true"
          EXPOSE_MANAGEMENT_ENDPOINTS: "true"
        run: |
          java -jar target/*.jar &
          echo "Waiting for engine on port 8081..."
          timeout 60 bash -c 'until curl -sf http://localhost:8081/actuator/health; do sleep 2; done'

      - name: Install portal dependencies
        working-directory: frontends/portal
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontends/portal
        run: npx playwright install --with-deps chromium

      - name: Build and start portal
        working-directory: frontends/portal
        env:
          NEXTAUTH_SECRET: ci-secret-for-tests
          NEXTAUTH_URL: http://localhost:4000
          KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID || 'werkflow-portal' }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET || 'ci-client-secret' }}
          KEYCLOAK_ISSUER: http://localhost:8090/realms/werkflow
          NEXT_PUBLIC_KEYCLOAK_ISSUER_BROWSER: http://localhost:8090/realms/werkflow
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${{ secrets.KEYCLOAK_CLIENT_ID || 'werkflow-portal' }}
          ENGINE_BASE_URL: http://localhost:8081
        run: |
          npm run build
          npm start &
          echo "Waiting for portal on port 4000..."
          timeout 60 bash -c 'until curl -sf http://localhost:4000; do sleep 2; done'

      - name: Run Playwright E2E tests
        working-directory: frontends/portal
        env:
          E2E_ADMIN_USER: admin
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || 'admin123' }}
          E2E_MANAGER_USER: john.manager
          E2E_MANAGER_PASSWORD: ${{ secrets.E2E_MANAGER_PASSWORD || 'manager123' }}
          E2E_EMPLOYEE_USER: jane.employee
          E2E_EMPLOYEE_PASSWORD: ${{ secrets.E2E_EMPLOYEE_PASSWORD || 'employee123' }}
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontends/portal/playwright-report/
          retention-days: 7
