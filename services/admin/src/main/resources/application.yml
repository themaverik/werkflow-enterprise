spring:
  application:
    name: werkflow-admin-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:werkflow}
    username: ${POSTGRES_USER:werkflow_admin}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${SPRING_DATASOURCE_SCHEMA:admin_service}
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: ${JPA_SHOW_SQL:false}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: ${SPRING_DATASOURCE_SCHEMA:admin_service}
    default-schema: ${SPRING_DATASOURCE_SCHEMA:admin_service}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8090}/realms/${KEYCLOAK_REALM:werkflow}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/${KEYCLOAK_REALM:werkflow}/protocol/openid-connect/certs}
      client:
        registration:
          werkflow-admin:
            client-id: werkflow-admin
            client-secret: ${ADMIN_CLIENT_SECRET:admin-dev-secret-do-not-use-in-prod}
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          werkflow-admin:
            token-uri: ${KEYCLOAK_TOKEN_URI:http://keycloak:8080/realms/${KEYCLOAK_REALM:werkflow}/protocol/openid-connect/token}

server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.werkflow.admin: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    oauth2-redirect-url: http://localhost:8083/swagger-ui/oauth2-redirect.html
  show-actuator: true

resilience4j:
  ratelimiter:
    instances:
      datasource-test:
        limitForPeriod: 5
        limitRefreshPeriod: 60s
        timeoutDuration: 0s

app:
  name: ${APP_NAME:Werkflow Admin Service}
  version: ${APP_VERSION:1.0.0}
  environment: ${APP_ENVIRONMENT:development}

  engine-service:
    url: ${ENGINE_SERVICE_URL:http://werkflow-engine:8081}

  erp-service:
    url: ${ERP_SERVICE_URL:http://werkflow-business:8084}

  keycloak:
    enabled: ${KEYCLOAK_ENABLED:true}
    realm: ${KEYCLOAK_REALM:werkflow}
    auth-server-url: ${KEYCLOAK_URL:http://localhost:8090}
    admin-url: ${KEYCLOAK_ADMIN_URL:http://localhost:8090}
    issuer-uri: ${KEYCLOAK_URL:http://localhost:8090}/realms/${KEYCLOAK_REALM:werkflow}
    client-id: ${KEYCLOAK_CLIENT_ID:werkflow-portal}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:REDACTED_KC_PORTAL_SECRET}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4000,http://localhost:4001}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  cache:
    pss-ttl-minutes: 5
    dtds-ttl-minutes: 30
    dtds-max-size: 1000

  routes:
    "studio": finance_head,finance_manager,hr_head,hr_manager,hub_manager,hub_request_approver,inventory_manager,it_head,it_manager,leave_request_approver,logistics_manager,procurement_approver,procurement_head,procurement_manager,super_admin
    "studio/**": finance_head,finance_manager,hr_head,hr_manager,hub_manager,hub_request_approver,inventory_manager,it_head,it_manager,leave_request_approver,logistics_manager,procurement_approver,procurement_head,procurement_manager,super_admin
    "services": finance_head,finance_manager,hr_head,hr_manager,hub_manager,hub_request_approver,inventory_manager,it_head,it_manager,leave_request_approver,logistics_manager,procurement_approver,procurement_head,procurement_manager,super_admin
    "services/**": finance_head,finance_manager,hr_head,hr_manager,hub_manager,hub_request_approver,inventory_manager,it_head,it_manager,leave_request_approver,logistics_manager,procurement_approver,procurement_head,procurement_manager,super_admin
    "admin": super_admin
    "admin/**": super_admin

# ----------------------------------------------------------------
# Werkflow platform-scoped settings
# ----------------------------------------------------------------
werkflow:
  # OpenBao secrets backend — tenant credential storage (M4.12 B.2).
  # In Docker the addr resolves to the in-network openbao service. For local
  # non-Docker runs, point at the OpenBao you started yourself.
  # The admin-service token has read+write+delete on secret/data/tenants/+/+/+.
  vault:
    addr: ${WERKFLOW_VAULT_ADDR:http://localhost:8200}
    token: ${WERKFLOW_VAULT_TOKEN:}
