<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="920" height="520" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Event Ticket Request — BPMN Flow</text>

  <!-- ── LANE LABELS ─────────────────────────────────────── -->
  <rect x="10" y="50" width="90" height="440" fill="#e2e8f0" rx="6"/>
  <text x="55" y="200" text-anchor="middle" font-size="11" font-weight="500" fill="#475569" transform="rotate(-90 55 200)">Employee</text>
  <text x="55" y="360" text-anchor="middle" font-size="11" font-weight="500" fill="#475569" transform="rotate(-90 55 360)">System / Manager</text>
  <line x1="10" y1="270" x2="100" y2="270" stroke="#cbd5e1" stroke-width="1"/>

  <!-- ── MAIN FLOW ───────────────────────────────────────── -->

  <!-- 1. Start Event -->
  <circle cx="150" cy="180" r="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="215" text-anchor="middle" font-size="10" fill="#374151">Ticket</text>
  <text x="150" y="227" text-anchor="middle" font-size="10" fill="#374151">Requested</text>

  <!-- Arrow: Start → DMN Route -->
  <line x1="168" y1="180" x2="218" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Service Task: DMN Route -->
  <rect x="218" y="155" width="110" height="50" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="5"/>
  <text x="273" y="175" text-anchor="middle" font-size="10" font-weight="500" fill="#1e40af">Route by</text>
  <text x="273" y="188" text-anchor="middle" font-size="10" font-weight="500" fill="#1e40af">Ticket Type</text>
  <text x="273" y="200" text-anchor="middle" font-size="9" fill="#6b7280">[DMN_ROUTE]</text>

  <!-- Arrow: DMN Route → Gateway -->
  <line x1="328" y1="180" x2="378" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Exclusive Gateway -->
  <polygon points="403,155 428,180 403,205 378,180" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="403" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#ca8a04">×</text>
  <text x="403" y="220" text-anchor="middle" font-size="10" fill="#374151">Ticket</text>
  <text x="403" y="232" text-anchor="middle" font-size="10" fill="#374151">Route?</text>

  <!-- ── FREE PATH (top) ──────────────────────────────────── -->

  <!-- Arrow: Gateway → Log Booking (free path, goes up) -->
  <polyline points="403,155 403,100 490,100" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="none"/>
  <text x="430" y="93" font-size="9" fill="#16a34a" font-weight="500">free ticket</text>
  <text x="430" y="103" font-size="9" fill="#16a34a">[approvalRequired=false]</text>

  <!-- 4a. Service Task: Log Booking -->
  <rect x="490" y="75" width="120" height="50" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" rx="5"/>
  <text x="550" y="97" text-anchor="middle" font-size="10" font-weight="500" fill="#15803d">Log Booking</text>
  <text x="550" y="110" text-anchor="middle" font-size="9" fill="#6b7280">[EXTERNAL_API_CALL]</text>
  <text x="550" y="121" text-anchor="middle" font-size="9" fill="#6b7280">mock-api /post</text>

  <!-- Arrow: Log Booking → Notify (free) -->
  <line x1="610" y1="100" x2="650" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4b. Service Task: Notify (free path) -->
  <rect x="650" y="75" width="120" height="50" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5" rx="5"/>
  <text x="710" y="97" text-anchor="middle" font-size="10" font-weight="500" fill="#7e22ce">Notify Requestor</text>
  <text x="710" y="110" text-anchor="middle" font-size="9" fill="#6b7280">[NOTIFICATION]</text>
  <text x="710" y="121" text-anchor="middle" font-size="9" fill="#6b7280">ticket-confirmed</text>

  <!-- Arrow: Notify (free) → End (free) -->
  <line x1="770" y1="100" x2="820" y2="100" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- End Event (free path) -->
  <circle cx="838" cy="100" r="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="838" cy="100" r="9" fill="#dc2626"/>
  <text x="838" y="124" text-anchor="middle" font-size="9" fill="#374151">Ticket</text>
  <text x="838" y="134" text-anchor="middle" font-size="9" fill="#374151">Confirmed</text>

  <!-- ── PAID PATH (bottom) ──────────────────────────────── -->

  <!-- Arrow: Gateway → Organiser Review (paid path, goes down) -->
  <polyline points="428,180 490,180" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="445" y="170" font-size="9" fill="#dc2626" font-weight="500">paid / vip</text>

  <!-- 5. User Task: Organiser Review -->
  <rect x="490" y="155" width="120" height="50" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <!-- Person icon -->
  <circle cx="506" cy="167" r="5" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <path d="M499,178 q7,-6 14,0" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="560" y="177" text-anchor="middle" font-size="10" font-weight="500" fill="#c2410c">Organiser</text>
  <text x="560" y="190" text-anchor="middle" font-size="10" font-weight="500" fill="#c2410c">Review</text>
  <text x="560" y="201" text-anchor="middle" font-size="9" fill="#6b7280">[HUMAN_APPROVAL]</text>

  <!-- Arrow: Organiser Review → Notify (paid) -->
  <line x1="610" y1="180" x2="650" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. Service Task: Notify (paid path) -->
  <rect x="650" y="155" width="120" height="50" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5" rx="5"/>
  <text x="710" y="177" text-anchor="middle" font-size="10" font-weight="500" fill="#7e22ce">Notify Requestor</text>
  <text x="710" y="190" text-anchor="middle" font-size="9" fill="#6b7280">[NOTIFICATION]</text>
  <text x="710" y="201" text-anchor="middle" font-size="9" fill="#6b7280">ticket-decision</text>

  <!-- Arrow: Notify → End (paid) -->
  <line x1="770" y1="180" x2="820" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- End Event (paid path) -->
  <circle cx="838" cy="180" r="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="838" cy="180" r="9" fill="#dc2626"/>
  <text x="838" y="204" text-anchor="middle" font-size="9" fill="#374151">Ticket</text>
  <text x="838" y="214" text-anchor="middle" font-size="9" fill="#374151">Decision Made</text>

  <!-- ── PARALLEL EXAMPLE (bottom half) ─────────────────── -->

  <text x="460" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">— When you DO need a parallel gateway —</text>
  <text x="460" y="318" text-anchor="middle" font-size="10" fill="#94a3b8">e.g. send email AND log to API at the same time</text>

  <!-- User Task: Approval -->
  <rect x="115" y="340" width="110" height="45" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" rx="5"/>
  <circle cx="131" cy="351" r="5" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <path d="M124,362 q7,-6 14,0" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="176" y="360" text-anchor="middle" font-size="10" font-weight="500" fill="#c2410c">Manager</text>
  <text x="176" y="373" text-anchor="middle" font-size="10" font-weight="500" fill="#c2410c">Approval</text>

  <!-- Arrow to parallel split -->
  <line x1="225" y1="362" x2="265" y2="362" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Parallel Gateway (split) -->
  <polygon points="290,340 315,362 290,385 265,362" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="290" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#0284c7">+</text>
  <text x="290" y="400" text-anchor="middle" font-size="9" fill="#374151">split</text>

  <!-- Upper parallel branch: Notify -->
  <polyline points="315,362 355,362 355,338 390,338" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Lower parallel branch: Log API -->
  <polyline points="290,385 290,410 390,410" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ST: Notify -->
  <rect x="390" y="318" width="120" height="42" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5" rx="5"/>
  <text x="450" y="336" text-anchor="middle" font-size="10" font-weight="500" fill="#7e22ce">Notify Requestor</text>
  <text x="450" y="349" text-anchor="middle" font-size="9" fill="#6b7280">[NOTIFICATION]</text>
  <text x="450" y="358" text-anchor="middle" font-size="9" fill="#9333ea">runs in parallel</text>

  <!-- ST: Log API -->
  <rect x="390" y="390" width="120" height="42" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" rx="5"/>
  <text x="450" y="408" text-anchor="middle" font-size="10" font-weight="500" fill="#15803d">Log to API</text>
  <text x="450" y="421" text-anchor="middle" font-size="9" fill="#6b7280">[EXTERNAL_API_CALL]</text>
  <text x="450" y="430" text-anchor="middle" font-size="9" fill="#16a34a">runs in parallel</text>

  <!-- Arrows to parallel join -->
  <polyline points="510,338 560,338 560,362" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <polyline points="510,410 560,410 560,385" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Parallel Gateway (join) -->
  <polygon points="585,340 610,362 585,385 560,362" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="585" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#0284c7">+</text>
  <text x="585" y="400" text-anchor="middle" font-size="9" fill="#374151">join (waits for both)</text>

  <!-- Arrow to End -->
  <line x1="610" y1="362" x2="660" y2="362" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- End Event (parallel) -->
  <circle cx="678" cy="362" r="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="678" cy="362" r="9" fill="#dc2626"/>
  <text x="678" y="386" text-anchor="middle" font-size="9" fill="#374151">End</text>

  <!-- ── LEGEND ──────────────────────────────────────────── -->
  <rect x="700" y="330" width="205" height="150" fill="white" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="802" y="348" text-anchor="middle" font-size="10" font-weight="600" fill="#374151">Legend</text>

  <circle cx="720" cy="365" r="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="735" y="369" font-size="9" fill="#374151">Start Event</text>

  <circle cx="720" cy="385" r="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <circle cx="720" cy="385" r="5" fill="#dc2626"/>
  <text x="735" y="389" font-size="9" fill="#374151">End Event</text>

  <rect x="712" y="398" width="16" height="12" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" rx="2"/>
  <text x="735" y="408" font-size="9" fill="#374151">User Task (human)</text>

  <rect x="712" y="416" width="16" height="12" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5" rx="2"/>
  <text x="735" y="426" font-size="9" fill="#374151">Service Task (NOTIFICATION)</text>

  <rect x="712" y="434" width="16" height="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" rx="2"/>
  <text x="735" y="444" font-size="9" fill="#374151">Service Task (EXTERNAL_API_CALL)</text>

  <polygon points="720,460 728,452 736,460 728,468" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="735" y="464" font-size="9" fill="#374151">Exclusive Gateway (×)</text>

  <polygon points="720,478 728,470 736,478 728,486" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="735" y="482" font-size="9" fill="#374151">Parallel Gateway (+)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

</svg>
